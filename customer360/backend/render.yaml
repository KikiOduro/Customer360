services:
  - type: web
    name: customer360-api
    runtime: python
    rootDir: customer360/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOW_CREDENTIALS
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://bsacwgdxmnuifvhfasof.supabase.co
      - key: SUPABASE_STORAGE_BUCKET
        value: user_uploads
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
